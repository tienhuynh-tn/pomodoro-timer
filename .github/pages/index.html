<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pomodoro Timer</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f4f7fb;
        color: #18212b;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at top, rgba(86, 121, 255, 0.18), transparent 36%),
          #f4f7fb;
      }

      main {
        width: min(680px, 100%);
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2rem, 4vw, 3rem);
        line-height: 1.05;
      }

      p {
        margin: 0 0 24px;
        font-size: 1.05rem;
        line-height: 1.6;
        color: #415063;
      }

      ul {
        list-style: none;
        padding: 0;
        margin: 0;
        display: grid;
        gap: 16px;
      }

      a {
        display: block;
        padding: 18px 20px;
        border: 1px solid #d7dfeb;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.88);
        color: inherit;
        text-decoration: none;
      }

      a:hover,
      a:focus-visible {
        border-color: #6e86ff;
        box-shadow: 0 10px 30px rgba(60, 85, 164, 0.12);
        outline: none;
      }

      strong {
        display: block;
        margin-bottom: 6px;
        font-size: 1.05rem;
      }

      span {
        color: #516075;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Pomodoro Timer</h1>
      <p>Choose the version you want to open on GitHub Pages.</p>
      <ul>
        <li>
          <a href="./by-codex/">
            <strong>by-codex</strong>
            <span>Static HTML, CSS, and JavaScript build.</span>
          </a>
        </li>
        <li>
          <a href="./by-antigravity/">
            <strong>by-antigravity</strong>
            <span>React and Vite build deployed under a nested Pages path.</span>
          </a>
        </li>
      </ul>
    </main>
  </body>
</html>

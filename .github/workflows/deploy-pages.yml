name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install by-antigravity dependencies
        working-directory: by-antigravity
        run: npm install

      - name: Build by-antigravity
        working-directory: by-antigravity
        run: npm run build

      - name: Prepare Pages artifact
        run: |
          mkdir -p _site/by-codex _site/by-antigravity
          cp by-codex/index.html by-codex/script.js by-codex/styles.css _site/by-codex/
          cp -R by-antigravity/dist/. _site/by-antigravity/
          cp .github/pages/index.html _site/index.html
          touch _site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
